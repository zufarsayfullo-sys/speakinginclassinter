<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Business & Entrepreneurship | Start Your Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Business Background - Dark Corporate with Chart Lines */
        .business-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 25%, #0d0d2b 50%, #1a1a3e 75%, #0a0a2e 100%);
        }

        /* Animated stock market lines */
        .stock-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .stock-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, #00ff88, transparent);
            animation: stockMove 8s ease-in-out infinite;
        }

        @keyframes stockMove {
            0% { width: 0%; opacity: 0; left: 0; }
            50% { width: 80%; opacity: 0.3; left: 10%; }
            100% { width: 0%; opacity: 0; left: 90%; }
        }

        .stock-line-2 {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffd700, #ffd700, transparent);
            animation: stockMoveReverse 10s ease-in-out infinite;
        }

        @keyframes stockMoveReverse {
            0% { width: 0%; opacity: 0; right: 0; }
            50% { width: 70%; opacity: 0.25; right: 10%; }
            100% { width: 0%; opacity: 0; right: 90%; }
        }

        /* Grid pattern - like a spreadsheet/business plan */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* Floating business icons */
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.08;
            pointer-events: none;
            animation: floatBusiness 20s ease-in-out infinite;
        }

        @keyframes floatBusiness {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(25px, -20px) rotate(5deg); }
            50% { transform: translate(-15px, -35px) rotate(-3deg); }
            75% { transform: translate(20px, -15px) rotate(4deg); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 20;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Corporate Dark */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 1.5rem;
            z-index: 30;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .sidebar-header .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #00ff88;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.3rem;
        }

        /* Part buttons - Business themed */
        .part-btn {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .part-btn:hover {
            background: rgba(0, 255, 136, 0.12);
            transform: translateX(5px);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .part-btn.active {
            background: linear-gradient(135deg, #00cc6a, #00994d);
            border-color: transparent;
        }

        .part-btn .part-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .part-btn .part-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .part-btn .part-sub {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* Timer & Roles Section */
        .sidebar-controls {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .timer-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: #00ff88;
            letter-spacing: 3px;
        }

        .timer-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.8rem;
        }

        .timer-btn {
            background: rgba(0, 255, 136, 0.15);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #00ff88;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .timer-btn:hover {
            background: #00ff88;
            color: #000;
        }

        .roles-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .role-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.8rem 0;
        }

        .role {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .role.active {
            background: #00ff88;
            color: #000;
        }

        .swap-btn {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #00ff88;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            transition: all 0.2s;
            font-weight: 600;
        }

        .swap-btn:hover {
            background: #00ff88;
            color: #000;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        /* Questions Container */
        .questions-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .part-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .part-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .part-header p {
            color: #888;
        }

        /* Question Cards - Business Cards Style */
        .question-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 255, 136, 0.15);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:nth-child(1) { animation-delay: 0.05s; }
        .question-card:nth-child(2) { animation-delay: 0.1s; }
        .question-card:nth-child(3) { animation-delay: 0.15s; }
        .question-card:nth-child(4) { animation-delay: 0.2s; }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #00ff88;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .question-card:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(8px);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .question-card:hover::before {
            opacity: 1;
        }

        .question-card.completed {
            background: rgba(0, 255, 136, 0.1);
            border-left: 4px solid #00ff88;
        }

        .question-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #00ff88;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .check-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0;
            transition: opacity 0.3s;
            color: #00ff88;
        }

        .question-card.completed .check-icon {
            opacity: 1;
        }

        /* Progress Section */
        .progress-section {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 136, 0.15);
        }

        .progress-dots {
            display: flex;
            gap: 0.8rem;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 136, 0.2);
            font-weight: 600;
            color: #888;
        }

        .dot.completed {
            background: #00ff88;
            color: #000;
            font-weight: 700;
        }

        .reset-btn {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .reset-btn:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 260px;
                padding: 1rem;
            }
            .timer-display {
                font-size: 1.8rem;
            }
            .question-text {
                font-size: 0.9rem;
            }
            .part-header h2 {
                font-size: 1.5rem;
            }
        }

        /* Scrollbar */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: rgba(0, 255, 136, 0.05);
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<!-- Business Background -->
<div class="business-bg"></div>
<div class="grid-pattern"></div>

<!-- Animated Stock Market Lines -->
<div class="stock-lines">
    <div class="stock-line" style="top: 20%; animation-delay: 0s;"></div>
    <div class="stock-line" style="top: 45%; animation-delay: 2s;"></div>
    <div class="stock-line" style="top: 70%; animation-delay: 4s;"></div>
    <div class="stock-line-2" style="top: 35%; animation-delay: 1s;"></div>
    <div class="stock-line-2" style="top: 60%; animation-delay: 3.5s;"></div>
    <div class="stock-line-2" style="top: 80%; animation-delay: 5s;"></div>
</div>

<!-- Floating Business Icons -->
<div class="floating-icon" style="top: 8%; left: 3%; animation-duration: 18s;">💼📊</div>
<div class="floating-icon" style="top: 65%; left: 10%; animation-duration: 22s;">📈💰</div>
<div class="floating-icon" style="top: 20%; right: 5%; animation-duration: 16s;">🏢💡</div>
<div class="floating-icon" style="top: 75%; right: 12%; animation-duration: 20s;">🤝💎</div>
<div class="floating-icon" style="top: 45%; left: 85%; animation-duration: 14s;">🚀⭐</div>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="icon">💼📈</div>
            <h2>Business & Entrepreneurship</h2>
            <p>Choose your discussion part</p>
        </div>

        <!-- Part 1 Button -->
        <div class="part-btn active" id="part1Btn">
            <div class="part-icon">🤔💡</div>
            <div class="part-title">Part 1 · Business Mindset</div>
            <div class="part-sub">Interests · Family · Success Stories</div>
        </div>

        <!-- Part 2 Button -->
        <div class="part-btn" id="part2Btn">
            <div class="part-icon">🚀📊</div>
            <div class="part-title">Part 2 · Starting Up</div>
            <div class="part-sub">Ideas · Challenges · Funding</div>
        </div>

        <!-- Timer & Roles -->
        <div class="sidebar-controls">
            <div class="timer-box">
                <div class="timer-display" id="timerDisplay">4:00</div>
                <div class="timer-buttons">
                    <button class="timer-btn" id="startBtn">▶ START</button>
                    <button class="timer-btn" id="resetBtn">⟳ RESET</button>
                </div>
            </div>

            <div class="roles-box">
                <div style="font-size: 0.8rem; margin-bottom: 0.5rem; color: #00ff88;">🎯 Discussion Roles</div>
                <div class="role-buttons">
                    <div class="role active" id="roleA">CEO A</div>
                    <div class="role" id="roleB">Investor B</div>
                </div>
                <button class="swap-btn" id="swapBtn">⇄ Swap Roles</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">
        <!-- Questions will be dynamically inserted here -->
    </div>
</div>

<script>
    // Questions Data
    const PART1_QUESTIONS = [
        { text: "Are you interested in doing business?" },
        { text: "Is it easy to set up a business in Uzbekistan?" },
        { text: "Do you have any business people in your family?" },
        { text: "What successful companies do you know?" }
    ];

    const PART2_QUESTIONS = [
        { text: "If you wanted to set up a business, what business would you start?" },
        { text: "What are the challenges of starting a business?" },
        { text: "How can you advertise your products or service?" },
        { text: "If you needed some financial support, how would you attract some investors?" }
    ];

    // State
    let currentPart = 1;
    let completed = new Set();
    let timeLeft = 240;
    let timerInterval = null;
    let isRunning = false;
    let roleAIsSpeaker = true;

    // DOM Elements
    const mainContent = document.getElementById('mainContent');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const swapBtn = document.getElementById('swapBtn');
    const roleA = document.getElementById('roleA');
    const roleB = document.getElementById('roleB');
    const part1Btn = document.getElementById('part1Btn');
    const part2Btn = document.getElementById('part2Btn');

    // Timer Functions
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 30) {
            timerDisplay.style.color = '#ff4444';
        } else if (timeLeft <= 60) {
            timerDisplay.style.color = '#ffaa44';
        } else {
            timerDisplay.style.color = '#00ff88';
        }
        
        if (timeLeft === 0 && isRunning) {
            stopTimer();
            alert("⏰ Time's up! Great business discussion!\n\nDid you cover all 4 questions? 💼");
        }
    }

    function startTimer() {
        if (isRunning) return;
        if (timeLeft <= 0) {
            timeLeft = 240;
            updateTimerDisplay();
        }
        isRunning = true;
        startBtn.textContent = '⏸ PAUSE';
        startBtn.style.background = '#00ff88';
        startBtn.style.color = '#000';
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            }
            if (timeLeft === 0) {
                stopTimer();
                alert("⏰ Time's up! Great business discussion!\n\nDid you cover all 4 questions? 💼");
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        startBtn.textContent = '▶ START';
        startBtn.style.background = 'rgba(0, 255, 136, 0.15)';
        startBtn.style.color = '#00ff88';
    }

    function resetTimer() {
        stopTimer();
        timeLeft = 240;
        updateTimerDisplay();
    }

    // Role Functions
    function updateRolesUI() {
        if (roleAIsSpeaker) {
            roleA.classList.add('active');
            roleB.classList.remove('active');
            roleA.innerHTML = '🎤 CEO A';
            roleB.innerHTML = '💰 Investor B';
        } else {
            roleB.classList.add('active');
            roleA.classList.remove('active');
            roleB.innerHTML = '🎤 CEO B';
            roleA.innerHTML = '💰 Investor A';
        }
    }

    function swapRoles() {
        roleAIsSpeaker = !roleAIsSpeaker;
        updateRolesUI();
    }

    // Question Functions
    function toggleQuestion(index) {
        const fullIndex = (currentPart === 1) ? index : index + 4;
        if (completed.has(fullIndex)) {
            completed.delete(fullIndex);
        } else {
            completed.add(fullIndex);
        }
        renderQuestions();
        renderDots();
    }

    function renderDots() {
        const progressContainer = document.querySelector('.progress-section');
        if (!progressContainer) return;
        
        const dotsDiv = progressContainer.querySelector('.progress-dots');
        if (!dotsDiv) return;
        
        dotsDiv.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const fullIndex = (currentPart === 1) ? i : i + 4;
            const dot = document.createElement('div');
            dot.className = `dot ${completed.has(fullIndex) ? 'completed' : ''}`;
            dot.textContent = i + 1;
            dot.onclick = () => toggleQuestion(i);
            dotsDiv.appendChild(dot);
        }
    }

    function renderQuestions() {
        const questions = currentPart === 1 ? PART1_QUESTIONS : PART2_QUESTIONS;
        const isPart1 = currentPart === 1;
        
        mainContent.innerHTML = `
            <div class="questions-container">
                <div class="part-header">
                    <h2>${isPart1 ? '💼 Part 1 · Business Mindset' : '🚀 Part 2 · Starting Your Venture'}</h2>
                    <p>${isPart1 ? 'Explore your interest in business and learn from success stories' : 'Turn ideas into reality - challenges, marketing, and funding'}</p>
                </div>
                
                ${questions.map((q, idx) => {
                    const fullIndex = currentPart === 1 ? idx : idx + 4;
                    const isCompleted = completed.has(fullIndex);
                    return `
                        <div class="question-card ${isCompleted ? 'completed' : ''}" onclick="window.toggleQuestion(${idx})">
                            <div class="question-number">Q${idx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="check-icon">✓</div>
                        </div>
                    `;
                }).join('')}
                
                <div class="progress-section">
                    <div class="progress-dots"></div>
                    <button class="reset-btn" id="resetProgressBtn">⟳ Reset Progress</button>
                </div>
            </div>
        `;
        
        renderDots();
        
        // Add reset progress listener
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        if (resetProgressBtn) {
            resetProgressBtn.onclick = () => {
                const startIndex = currentPart === 1 ? 0 : 4;
                const endIndex = startIndex + 4;
                for (let i = startIndex; i < endIndex; i++) {
                    completed.delete(i);
                }
                renderQuestions();
                renderDots();
            };
        }
    }

    // Part Switching
    function switchToPart(part) {
        currentPart = part;
        
        if (part === 1) {
            part1Btn.classList.add('active');
            part2Btn.classList.remove('active');
        } else {
            part2Btn.classList.add('active');
            part1Btn.classList.remove('active');
        }
        
        renderQuestions();
    }

    // Make toggleQuestion globally accessible
    window.toggleQuestion = toggleQuestion;

    // Initialize
    function init() {
        updateTimerDisplay();
        renderQuestions();
        updateRolesUI();
        
        startBtn.onclick = startTimer;
        resetBtn.onclick = resetTimer;
        swapBtn.onclick = swapRoles;
        part1Btn.onclick = () => switchToPart(1);
        part2Btn.onclick = () => switchToPart(2);
    }

    init();
</script>
</body>
</html>
