<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Happiness & Patience | Journey of Joy</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Split Background */
        .split-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 0;
        }

        /* Part 1 - Happiness Side (Warm Yellow/Orange) */
        .happiness-side {
            flex: 1;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd700 100%);
            position: relative;
            overflow: hidden;
        }

        .happiness-side::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="30" r="5" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="50" r="8" fill="rgba(255,255,255,0.08)"/><circle cx="40" cy="70" r="6" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="20" r="4" fill="rgba(255,255,255,0.08)"/></svg>');
            background-size: 100px 100px;
            animation: floatBubbles 20s linear infinite;
        }

        /* Part 2 - Kids/Patience Side (Soft Blue/Purple) */
        .kids-side {
            flex: 1;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 50%, #00b4db 100%);
            position: relative;
            overflow: hidden;
        }

        .kids-side::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="15" y="30" fill="rgba(255,255,255,0.08)" font-size="14">🧸</text><text x="70" y="50" fill="rgba(255,255,255,0.08)" font-size="12">🎈</text><text x="40" y="80" fill="rgba(255,255,255,0.08)" font-size="16">🪀</text></svg>');
            background-size: 80px 80px;
            animation: floatToys 18s linear infinite;
        }

        @keyframes floatBubbles {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }

        @keyframes floatToys {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-120px) rotate(10deg); }
        }

        /* Floating happy emojis - Happiness side */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.15;
            pointer-events: none;
            animation: floatAround 15s ease-in-out infinite;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -25px) rotate(5deg); }
            50% { transform: translate(-15px, -35px) rotate(-3deg); }
            75% { transform: translate(15px, -20px) rotate(4deg); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 20;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 1.5rem;
            z-index: 30;
            transition: all 0.3s;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0.3rem;
        }

        /* Part buttons */
        .part-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .part-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .part-btn.active {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-color: transparent;
        }

        .part-btn.kids.active {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .part-btn .part-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .part-btn .part-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }

        .part-btn .part-sub {
            font-size: 0.7rem;
            color: #ccc;
        }

        /* Timer & Roles Section in Sidebar */
        .sidebar-controls {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .timer-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 3px;
        }

        .timer-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.8rem;
        }

        .timer-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .timer-btn:hover {
            background: #ffd700;
            color: #000;
        }

        .roles-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .role-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.8rem 0;
        }

        .role {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .role.active {
            background: #ffd700;
            color: #000;
        }

        .swap-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            transition: all 0.2s;
        }

        .swap-btn:hover {
            background: #ffd700;
            color: #000;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        /* Questions Container */
        .questions-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .part-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .part-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .part-header p {
            color: #aaa;
        }

        .happiness-header {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .kids-header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Question Cards */
        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:nth-child(1) { animation-delay: 0.05s; }
        .question-card:nth-child(2) { animation-delay: 0.1s; }
        .question-card:nth-child(3) { animation-delay: 0.15s; }
        .question-card:nth-child(4) { animation-delay: 0.2s; }

        .question-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(8px);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .question-card.completed {
            background: rgba(255, 215, 0, 0.15);
            border-left: 4px solid #ffd700;
        }

        .question-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .check-icon {
            float: right;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .question-card.completed .check-icon {
            opacity: 1;
            color: #ffd700;
        }

        /* Progress Section */
        .progress-section {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-dots {
            display: flex;
            gap: 0.8rem;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .dot.completed {
            background: #ffd700;
            color: #000;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 240px;
                padding: 1rem;
            }
            .timer-display {
                font-size: 1.8rem;
            }
            .question-text {
                font-size: 0.95rem;
            }
        }

        /* Scrollbar */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<!-- Split Background -->
<div class="split-bg">
    <div class="happiness-side"></div>
    <div class="kids-side"></div>
</div>

<!-- Floating Emojis - Happiness Side -->
<div class="floating-emoji" style="top: 10%; left: 5%; animation-duration: 14s;">😊🌟</div>
<div class="floating-emoji" style="top: 60%; left: 15%; animation-duration: 18s;">😄✨</div>
<div class="floating-emoji" style="top: 30%; right: 8%; animation-duration: 16s;">🥰💫</div>
<div class="floating-emoji" style="top: 75%; right: 20%; animation-duration: 20s;">😍🌞</div>

<!-- Floating Emojis - Kids Side -->
<div class="floating-emoji" style="top: 15%; right: 5%; animation-duration: 17s;">🧸🎈</div>
<div class="floating-emoji" style="top: 50%; right: 12%; animation-duration: 19s;">👶🪀</div>
<div class="floating-emoji" style="top: 70%; left: 80%; animation-duration: 15s;">🎨🖍️</div>
<div class="floating-emoji" style="top: 25%; left: 75%; animation-duration: 22s;">🍭🧩</div>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="icon">🎯</div>
            <h2>Happiness & Patience</h2>
            <p>Choose your discussion part</p>
        </div>

        <!-- Part 1 Button -->
        <div class="part-btn active" id="part1Btn">
            <div class="part-icon">😊✨</div>
            <div class="part-title">Part 1 · Happiness</div>
            <div class="part-sub">Explore your emotions & joy</div>
        </div>

        <!-- Part 2 Button -->
        <div class="part-btn kids" id="part2Btn">
            <div class="part-icon">👶🧸</div>
            <div class="part-title">Part 2 · Kids & Patience</div>
            <div class="part-sub">Understanding children & self-control</div>
        </div>

        <!-- Timer & Roles -->
        <div class="sidebar-controls">
            <div class="timer-box">
                <div class="timer-display" id="timerDisplay">4:00</div>
                <div class="timer-buttons">
                    <button class="timer-btn" id="startBtn">▶ START</button>
                    <button class="timer-btn" id="resetBtn">⟳ RESET</button>
                </div>
            </div>

            <div class="roles-box">
                <div style="font-size: 0.8rem; margin-bottom: 0.5rem;">🎤 Discussion Roles</div>
                <div class="role-buttons">
                    <div class="role active" id="roleA">Speaker A</div>
                    <div class="role" id="roleB">Listener B</div>
                </div>
                <button class="swap-btn" id="swapBtn">⇄ Swap Roles</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">
        <!-- Questions will be dynamically inserted here -->
    </div>
</div>

<script>
    // Questions Data
    const PART1_QUESTIONS = [
        { text: "Are you a happy person?" },
        { text: "When do you feel unhappy?" },
        { text: "What makes you happy?" },
        { text: "Are you introvert or extravert?" }
    ];

    const PART2_QUESTIONS = [
        { text: "Are kids patient nowadays? What things can't they wait for?" },
        { text: "Should parents buy their kids whatever they want?" },
        { text: "Do parents need to teach their children to be patient?" },
        { text: "How do you manage to resist your temptation?" }
    ];

    // State
    let currentPart = 1;
    let completed = new Set();
    let timeLeft = 240;
    let timerInterval = null;
    let isRunning = false;
    let roleAIsSpeaker = true;

    // DOM Elements
    const mainContent = document.getElementById('mainContent');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const swapBtn = document.getElementById('swapBtn');
    const roleA = document.getElementById('roleA');
    const roleB = document.getElementById('roleB');
    const part1Btn = document.getElementById('part1Btn');
    const part2Btn = document.getElementById('part2Btn');

    // Timer Functions
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 30) {
            timerDisplay.style.color = '#ff4444';
        } else if (timeLeft <= 60) {
            timerDisplay.style.color = '#ffaa44';
        } else {
            timerDisplay.style.color = '#ffd700';
        }
        
        if (timeLeft === 0 && isRunning) {
            stopTimer();
            alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 🎯");
        }
    }

    function startTimer() {
        if (isRunning) return;
        if (timeLeft <= 0) {
            timeLeft = 240;
            updateTimerDisplay();
        }
        isRunning = true;
        startBtn.textContent = '⏸ PAUSE';
        startBtn.style.background = '#ffd700';
        startBtn.style.color = '#000';
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            }
            if (timeLeft === 0) {
                stopTimer();
                alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 🎯");
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        startBtn.textContent = '▶ START';
        startBtn.style.background = 'rgba(255, 215, 0, 0.2)';
        startBtn.style.color = '#fff';
    }

    function resetTimer() {
        stopTimer();
        timeLeft = 240;
        updateTimerDisplay();
    }

    // Role Functions
    function updateRolesUI() {
        if (roleAIsSpeaker) {
            roleA.classList.add('active');
            roleB.classList.remove('active');
            roleA.innerHTML = '🎤 Speaker A';
            roleB.innerHTML = '👂 Listener B';
        } else {
            roleB.classList.add('active');
            roleA.classList.remove('active');
            roleB.innerHTML = '🎤 Speaker B';
            roleA.innerHTML = '👂 Listener A';
        }
    }

    function swapRoles() {
        roleAIsSpeaker = !roleAIsSpeaker;
        updateRolesUI();
    }

    // Question Functions
    function toggleQuestion(index) {
        const fullIndex = (currentPart === 1) ? index : index + 4;
        if (completed.has(fullIndex)) {
            completed.delete(fullIndex);
        } else {
            completed.add(fullIndex);
        }
        renderQuestions();
        renderDots();
    }

    function renderDots() {
        const progressContainer = document.querySelector('.progress-section');
        if (!progressContainer) return;
        
        const dotsDiv = progressContainer.querySelector('.progress-dots');
        if (!dotsDiv) return;
        
        dotsDiv.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const fullIndex = (currentPart === 1) ? i : i + 4;
            const dot = document.createElement('div');
            dot.className = `dot ${completed.has(fullIndex) ? 'completed' : ''}`;
            dot.textContent = i + 1;
            dot.onclick = () => toggleQuestion(i);
            dotsDiv.appendChild(dot);
        }
    }

    function renderQuestions() {
        const questions = currentPart === 1 ? PART1_QUESTIONS : PART2_QUESTIONS;
        const isHappiness = currentPart === 1;
        
        mainContent.innerHTML = `
            <div class="questions-container">
                <div class="part-header">
                    <h2 class="${isHappiness ? 'happiness-header' : 'kids-header'}">
                        ${isHappiness ? '😊 Part 1 · Journey into Happiness' : '👶 Part 2 · Kids & The Art of Patience'}
                    </h2>
                    <p>${isHappiness ? 'Explore what makes you happy and how you express joy' : 'Understanding children\'s patience and managing temptations'}</p>
                </div>
                
                ${questions.map((q, idx) => {
                    const fullIndex = currentPart === 1 ? idx : idx + 4;
                    const isCompleted = completed.has(fullIndex);
                    return `
                        <div class="question-card ${isCompleted ? 'completed' : ''}" onclick="window.toggleQuestion(${idx})">
                            <div class="question-number">QUESTION ${idx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="check-icon">✓</div>
                        </div>
                    `;
                }).join('')}
                
                <div class="progress-section">
                    <div class="progress-dots"></div>
                    <button class="reset-btn" id="resetProgressBtn">⟳ Reset Progress</button>
                </div>
            </div>
        `;
        
        renderDots();
        
        // Add reset progress listener
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        if (resetProgressBtn) {
            resetProgressBtn.onclick = () => {
                const startIndex = currentPart === 1 ? 0 : 4;
                const endIndex = startIndex + 4;
                for (let i = startIndex; i < endIndex; i++) {
                    completed.delete(i);
                }
                renderQuestions();
                renderDots();
            };
        }
    }

    // Part Switching
    function switchToPart(part) {
        currentPart = part;
        
        if (part === 1) {
            part1Btn.classList.add('active');
            part2Btn.classList.remove('active');
        } else {
            part2Btn.classList.add('active');
            part1Btn.classList.remove('active');
        }
        
        renderQuestions();
    }

    // Make toggleQuestion globally accessible
    window.toggleQuestion = toggleQuestion;

    // Initialize
    function init() {
        updateTimerDisplay();
        renderQuestions();
        updateRolesUI();
        
        startBtn.onclick = startTimer;
        resetBtn.onclick = resetTimer;
        swapBtn.onclick = swapRoles;
        part1Btn.onclick = () => switchToPart(1);
        part2Btn.onclick = () => switchToPart(2);
    }

    init();
</script>
</body>
</html>
