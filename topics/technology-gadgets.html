<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Technology & Gadgets | Digital Age</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Modern Tech Background */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #0d1117 30%, #161b22 70%, #0a0a0a 100%);
        }

        /* Tech Photo Overlay */
        .tech-photo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1600&h=1000&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
            z-index: 0;
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.05); opacity: 0.15; }
        }

        /* Circuit Board Pattern */
        .circuit-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Animated circuit lines */
        .circuit-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .circuit-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, #00ffff, transparent);
            animation: circuitFlow 8s ease-in-out infinite;
        }

        @keyframes circuitFlow {
            0% { width: 0%; opacity: 0; left: 0; }
            50% { width: 60%; opacity: 0.4; left: 20%; }
            100% { width: 0%; opacity: 0; left: 80%; }
        }

        /* Floating Tech Icons */
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            animation: floatTech 18s ease-in-out infinite;
        }

        @keyframes floatTech {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(25px, -20px) rotate(5deg); }
            50% { transform: translate(-15px, -35px) rotate(-3deg); }
            75% { transform: translate(20px, -15px) rotate(4deg); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 20;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Tech Style */
        .sidebar {
            width: 300px;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 1.5rem;
            z-index: 30;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .sidebar-header .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            animation: iconGlow 2s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { text-shadow: 0 0 5px #00ffff; }
            50% { text-shadow: 0 0 15px #00ffff; }
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.3rem;
        }

        /* Part buttons - Tech themed */
        .part-btn {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .part-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            transform: translateX(5px);
            border-color: rgba(0, 255, 255, 0.4);
        }

        .part-btn.active {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border-color: transparent;
        }

        .part-btn.active .part-title,
        .part-btn.active .part-sub {
            color: #000;
        }

        .part-btn .part-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .part-btn .part-title {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            color: #00ffff;
        }

        .part-btn .part-sub {
            font-size: 0.65rem;
            opacity: 0.8;
            color: #aaa;
        }

        /* Timer & Roles Section */
        .sidebar-controls {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .timer-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: #00ffff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .timer-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.8rem;
        }

        .timer-btn {
            background: rgba(0, 255, 255, 0.15);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #00ffff;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .timer-btn:hover {
            background: #00ffff;
            color: #000;
        }

        .roles-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .role-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.8rem 0;
        }

        .role {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .role.active {
            background: #00ffff;
            color: #000;
        }

        .swap-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #00ffff;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            transition: all 0.2s;
            font-weight: 600;
        }

        .swap-btn:hover {
            background: #00ffff;
            color: #000;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        /* Questions Container */
        .questions-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .part-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .part-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .part-header p {
            color: #aaa;
        }

        /* Question Cards - Glassmorphism */
        .question-card {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 255, 255, 0.15);
            position: relative;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:nth-child(1) { animation-delay: 0.05s; }
        .question-card:nth-child(2) { animation-delay: 0.1s; }
        .question-card:nth-child(3) { animation-delay: 0.15s; }
        .question-card:nth-child(4) { animation-delay: 0.2s; }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #00ffff;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .question-card:hover {
            background: rgba(13, 17, 23, 0.9);
            transform: translateX(8px);
            border-color: rgba(0, 255, 255, 0.4);
        }

        .question-card:hover::before {
            opacity: 1;
        }

        .question-card.completed {
            background: rgba(0, 255, 255, 0.08);
            border-left: 4px solid #00ffff;
        }

        .question-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #00ffff;
            font-weight: 700;
        }

        .question-text {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .check-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0;
            transition: opacity 0.3s;
            color: #00ffff;
        }

        .question-card.completed .check-icon {
            opacity: 1;
        }

        /* Progress Section */
        .progress-section {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        .progress-dots {
            display: flex;
            gap: 0.8rem;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 255, 0.2);
            font-weight: 600;
        }

        .dot.completed {
            background: #00ffff;
            color: #000;
            font-weight: 700;
        }

        .reset-btn {
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(0, 255, 255, 0.15);
        }

        /* Tech binary text in corner */
        .binary-corner {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 0.6rem;
            color: rgba(0, 255, 255, 0.15);
            font-family: monospace;
            z-index: 0;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 260px;
                padding: 1rem;
            }
            .timer-display {
                font-size: 1.8rem;
            }
            .question-text {
                font-size: 0.9rem;
            }
            .part-header h2 {
                font-size: 1.5rem;
            }
        }

        /* Scrollbar */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.05);
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<!-- Tech Background -->
<div class="tech-bg"></div>
<div class="tech-photo"></div>
<div class="circuit-pattern"></div>

<!-- Animated Circuit Lines -->
<div class="circuit-lines">
    <div class="circuit-line" style="top: 15%; animation-delay: 0s;"></div>
    <div class="circuit-line" style="top: 35%; animation-delay: 2s;"></div>
    <div class="circuit-line" style="top: 55%; animation-delay: 4s;"></div>
    <div class="circuit-line" style="top: 75%; animation-delay: 1s;"></div>
</div>

<!-- Floating Tech Icons -->
<div class="floating-icon" style="top: 8%; left: 3%; animation-duration: 16s;">💻🖥️</div>
<div class="floating-icon" style="top: 65%; left: 8%; animation-duration: 20s;">📱📲</div>
<div class="floating-icon" style="top: 20%; right: 5%; animation-duration: 14s;">🔬⚡</div>
<div class="floating-icon" style="top: 75%; right: 10%; animation-duration: 22s;">🤖💡</div>
<div class="floating-icon" style="top: 45%; left: 85%; animation-duration: 18s;">🌐🔒</div>

<!-- Binary Corner -->
<div class="binary-corner">01010100 01100101 01100011 01101000</div>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="icon">💻🤖</div>
            <h2>Technology & Gadgets</h2>
            <p>Choose your discussion part</p>
        </div>

        <!-- Part 1 Button -->
        <div class="part-btn active" id="part1Btn">
            <div class="part-icon">📱💡</div>
            <div class="part-title">Part 1 · Daily Tech</div>
            <div class="part-sub">How we use tech · Gadgets · Communication</div>
        </div>

        <!-- Part 2 Button -->
        <div class="part-btn" id="part2Btn">
            <div class="part-icon">🌐🔮</div>
            <div class="part-title">Part 2 · Tech & Society</div>
            <div class="part-sub">Dependency · Inventions · The Future</div>
        </div>

        <!-- Timer & Roles -->
        <div class="sidebar-controls">
            <div class="timer-box">
                <div class="timer-display" id="timerDisplay">4:00</div>
                <div class="timer-buttons">
                    <button class="timer-btn" id="startBtn">▶ START</button>
                    <button class="timer-btn" id="resetBtn">⟳ RESET</button>
                </div>
            </div>

            <div class="roles-box">
                <div style="font-size: 0.8rem; margin-bottom: 0.5rem; color: #00ffff;">👥 Discussion Roles</div>
                <div class="role-buttons">
                    <div class="role active" id="roleA">Tech Expert A</div>
                    <div class="role" id="roleB">User B</div>
                </div>
                <button class="swap-btn" id="swapBtn">⇄ Swap Roles</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">
        <!-- Questions will be dynamically inserted here -->
    </div>
</div>

<script>
    // Questions Data
    const PART1_QUESTIONS = [
        { text: "How do you use technology every day?" },
        { text: "Does technology make life easier or harder? Why?" },
        { text: "What is your favorite gadget or device? Why?" },
        { text: "How do you use technology to talk to your friends and family?" }
    ];

    const PART2_QUESTIONS = [
        { text: "Do people depend too much on technology? Why or why not?" },
        { text: "What are the most important inventions in technology? Why?" },
        { text: "What are some bad things about modern technology?" },
        { text: "How do you think technology will change in the future?" }
    ];

    // State
    let currentPart = 1;
    let completed = new Set();
    let timeLeft = 240;
    let timerInterval = null;
    let isRunning = false;
    let roleAIsSpeaker = true;

    // DOM Elements
    const mainContent = document.getElementById('mainContent');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const swapBtn = document.getElementById('swapBtn');
    const roleA = document.getElementById('roleA');
    const roleB = document.getElementById('roleB');
    const part1Btn = document.getElementById('part1Btn');
    const part2Btn = document.getElementById('part2Btn');

    // Timer Functions
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 30) {
            timerDisplay.style.color = '#ff4444';
            timerDisplay.style.textShadow = '0 0 10px #ff4444';
        } else if (timeLeft <= 60) {
            timerDisplay.style.color = '#ffaa44';
            timerDisplay.style.textShadow = '0 0 5px #ffaa44';
        } else {
            timerDisplay.style.color = '#00ffff';
            timerDisplay.style.textShadow = '0 0 10px rgba(0, 255, 255, 0.5)';
        }
        
        if (timeLeft === 0 && isRunning) {
            stopTimer();
            alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 💻");
        }
    }

    function startTimer() {
        if (isRunning) return;
        if (timeLeft <= 0) {
            timeLeft = 240;
            updateTimerDisplay();
        }
        isRunning = true;
        startBtn.textContent = '⏸ PAUSE';
        startBtn.style.background = '#00ffff';
        startBtn.style.color = '#000';
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            }
            if (timeLeft === 0) {
                stopTimer();
                alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 💻");
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        startBtn.textContent = '▶ START';
        startBtn.style.background = 'rgba(0, 255, 255, 0.15)';
        startBtn.style.color = '#00ffff';
    }

    function resetTimer() {
        stopTimer();
        timeLeft = 240;
        updateTimerDisplay();
    }

    // Role Functions
    function updateRolesUI() {
        if (roleAIsSpeaker) {
            roleA.classList.add('active');
            roleB.classList.remove('active');
            roleA.innerHTML = '💻 Tech Expert A';
            roleB.innerHTML = '👤 User B';
        } else {
            roleB.classList.add('active');
            roleA.classList.remove('active');
            roleB.innerHTML = '💻 Tech Expert B';
            roleA.innerHTML = '👤 User A';
        }
    }

    function swapRoles() {
        roleAIsSpeaker = !roleAIsSpeaker;
        updateRolesUI();
    }

    // Question Functions
    function toggleQuestion(index) {
        const fullIndex = (currentPart === 1) ? index : index + 4;
        if (completed.has(fullIndex)) {
            completed.delete(fullIndex);
        } else {
            completed.add(fullIndex);
        }
        renderQuestions();
        renderDots();
    }

    function renderDots() {
        const progressContainer = document.querySelector('.progress-section');
        if (!progressContainer) return;
        
        const dotsDiv = progressContainer.querySelector('.progress-dots');
        if (!dotsDiv) return;
        
        dotsDiv.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const fullIndex = (currentPart === 1) ? i : i + 4;
            const dot = document.createElement('div');
            dot.className = `dot ${completed.has(fullIndex) ? 'completed' : ''}`;
            dot.textContent = i + 1;
            dot.onclick = () => toggleQuestion(i);
            dotsDiv.appendChild(dot);
        }
    }

    function renderQuestions() {
        const questions = currentPart === 1 ? PART1_QUESTIONS : PART2_QUESTIONS;
        const isPart1 = currentPart === 1;
        
        mainContent.innerHTML = `
            <div class="questions-container">
                <div class="part-header">
                    <h2>${isPart1 ? '💻 Part 1 · Technology in Everyday Life' : '🌐 Part 2 · The Future of Technology'}</h2>
                    <p>${isPart1 ? 'Explore how we use gadgets and connect with others through tech' : 'Discuss tech dependency, innovations, and what tomorrow might bring'}</p>
                </div>
                
                ${questions.map((q, idx) => {
                    const fullIndex = currentPart === 1 ? idx : idx + 4;
                    const isCompleted = completed.has(fullIndex);
                    return `
                        <div class="question-card ${isCompleted ? 'completed' : ''}" onclick="window.toggleQuestion(${idx})">
                            <div class="question-number">Q${idx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="check-icon">✓</div>
                        </div>
                    `;
                }).join('')}
                
                <div class="progress-section">
                    <div class="progress-dots"></div>
                    <button class="reset-btn" id="resetProgressBtn">⟳ Reset Progress</button>
                </div>
            </div>
        `;
        
        renderDots();
        
        // Add reset progress listener
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        if (resetProgressBtn) {
            resetProgressBtn.onclick = () => {
                const startIndex = currentPart === 1 ? 0 : 4;
                const endIndex = startIndex + 4;
                for (let i = startIndex; i < endIndex; i++) {
                    completed.delete(i);
                }
                renderQuestions();
                renderDots();
            };
        }
    }

    // Part Switching
    function switchToPart(part) {
        currentPart = part;
        
        if (part === 1) {
            part1Btn.classList.add('active');
            part2Btn.classList.remove('active');
        } else {
            part2Btn.classList.add('active');
            part1Btn.classList.remove('active');
        }
        
        renderQuestions();
    }

    // Make toggleQuestion globally accessible
    window.toggleQuestion = toggleQuestion;

    // Initialize
    function init() {
        updateTimerDisplay();
        renderQuestions();
        updateRolesUI();
        
        startBtn.onclick = startTimer;
        resetBtn.onclick = resetTimer;
        swapBtn.onclick = swapRoles;
        part1Btn.onclick = () => switchToPart(1);
        part2Btn.onclick = () => switchToPart(2);
    }

    init();
</script>
</body>
</html>
