<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Movies & Video Games | Cinema to CS2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Split Background - Changes based on selected part */
        .film-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .film-bg.active {
            opacity: 1;
        }

        .film-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600&h=1000&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        .games-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0d0d1a 100%);
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .games-bg.active {
            opacity: 1;
        }

        .games-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1600&h=1000&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
            animation: slowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* Film Strip Pattern */
        .film-strip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 30px,
                rgba(255, 215, 0, 0.03) 30px,
                rgba(255, 215, 0, 0.03) 35px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Gaming Grid Pattern */
        .gaming-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Icons - Film Side */
        .film-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            animation: floatFilm 18s ease-in-out infinite;
        }

        @keyframes floatFilm {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(25px, -20px) rotate(5deg); }
            50% { transform: translate(-15px, -35px) rotate(-3deg); }
            75% { transform: translate(20px, -15px) rotate(4deg); }
        }

        /* Floating Icons - Gaming Side */
        .game-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            pointer-events: none;
            animation: floatGame 20s ease-in-out infinite;
        }

        @keyframes floatGame {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -15px) scale(1.05); }
            50% { transform: translate(-20px, -30px) scale(0.95); }
            75% { transform: translate(15px, -25px) scale(1.02); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 20;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            gap: 1.5rem;
            z-index: 30;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header .icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0.3rem;
        }

        /* Part buttons */
        .part-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .part-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .part-btn.active {
            background: linear-gradient(135deg, #e50914, #b20710);
            border-color: transparent;
        }

        .part-btn.games.active {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .part-btn .part-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .part-btn .part-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .part-btn .part-sub {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* Timer & Roles Section */
        .sidebar-controls {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .timer-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 2.5rem;
            font-weight: 800;
            color: #e50914;
            letter-spacing: 3px;
        }

        .timer-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.8rem;
        }

        .timer-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .timer-btn:hover {
            background: #e50914;
            color: #fff;
        }

        .roles-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .role-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.8rem 0;
        }

        .role {
            padding: 0.4rem 1rem;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .role.active {
            background: #e50914;
            color: #fff;
        }

        .swap-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            transition: all 0.2s;
        }

        .swap-btn:hover {
            background: #e50914;
            color: #fff;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        /* Questions Container */
        .questions-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .part-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .part-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .film-header {
            background: linear-gradient(135deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-header {
            background: linear-gradient(135deg, #2ecc71, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .part-header p {
            color: #aaa;
        }

        /* Question Cards */
        .question-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:nth-child(1) { animation-delay: 0.05s; }
        .question-card:nth-child(2) { animation-delay: 0.1s; }
        .question-card:nth-child(3) { animation-delay: 0.15s; }
        .question-card:nth-child(4) { animation-delay: 0.2s; }

        .question-card:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(8px);
        }

        .film-mode .question-card:hover {
            border-color: rgba(229, 9, 20, 0.4);
        }

        .game-mode .question-card:hover {
            border-color: rgba(46, 204, 113, 0.4);
        }

        .question-card.completed {
            background: rgba(229, 9, 20, 0.12);
            border-left: 4px solid #e50914;
        }

        .game-mode .question-card.completed {
            background: rgba(46, 204, 113, 0.12);
            border-left: 4px solid #2ecc71;
        }

        .question-number {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            color: #e50914;
            font-weight: 600;
        }

        .game-mode .question-number {
            color: #2ecc71;
        }

        .question-text {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .check-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0;
            transition: opacity 0.3s;
            color: #e50914;
        }

        .game-mode .check-icon {
            color: #2ecc71;
        }

        .question-card.completed .check-icon {
            opacity: 1;
        }

        /* Progress Section */
        .progress-section {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-dots {
            display: flex;
            gap: 0.8rem;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .dot.completed {
            background: #e50914;
            color: #000;
        }

        .game-mode .dot.completed {
            background: #2ecc71;
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 260px;
                padding: 1rem;
            }
            .timer-display {
                font-size: 1.8rem;
            }
            .question-text {
                font-size: 0.9rem;
            }
            .part-header h2 {
                font-size: 1.5rem;
            }
        }

        /* Scrollbar */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 3px;
        }
        .game-mode .main-content::-webkit-scrollbar-thumb {
            background: #2ecc71;
        }
    </style>
</head>
<body>

<!-- Film Background -->
<div class="film-bg" id="filmBg"></div>
<div class="film-strip"></div>

<!-- Game Background -->
<div class="games-bg" id="gamesBg"></div>
<div class="gaming-grid"></div>

<!-- Floating Icons - Film Side -->
<div class="film-icon" style="top: 8%; left: 3%; animation-duration: 16s;">🎬🍿</div>
<div class="film-icon" style="top: 65%; left: 10%; animation-duration: 20s;">🎥🎞️</div>
<div class="film-icon" style="top: 20%; right: 5%; animation-duration: 14s;">⭐🎭</div>
<div class="film-icon" style="top: 75%; right: 12%; animation-duration: 22s;">🏆🎬</div>

<!-- Floating Icons - Game Side (CS2 themed) -->
<div class="game-icon" style="top: 15%; right: 5%; animation-duration: 17s;">🎮🔫</div>
<div class="game-icon" style="top: 55%; right: 12%; animation-duration: 19s;">⌨️🖱️</div>
<div class="game-icon" style="top: 70%; right: 8%; animation-duration: 15s;">💣⚡</div>
<div class="game-icon" style="top: 25%; right: 18%; animation-duration: 21s;">🏆👑</div>

<div class="container" id="appContainer">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="icon">🎬🎮</div>
            <h2>Movies & Video Games</h2>
            <p>Choose your discussion part</p>
        </div>

        <!-- Part 1 Button - Film Theme -->
        <div class="part-btn active" id="part1Btn">
            <div class="part-icon">🎬🍿</div>
            <div class="part-title">Part 1 · Films & Cinema</div>
            <div class="part-sub">Movies · Actors · Cinema Experience</div>
        </div>

        <!-- Part 2 Button - Game Theme (CS2) -->
        <div class="part-btn games" id="part2Btn">
            <div class="part-icon">🎮🔫</div>
            <div class="part-title">Part 2 · Video Games (CS2)</div>
            <div class="part-sub">Gaming · Strategy · Multiplayer</div>
        </div>

        <!-- Timer & Roles -->
        <div class="sidebar-controls">
            <div class="timer-box">
                <div class="timer-display" id="timerDisplay">4:00</div>
                <div class="timer-buttons">
                    <button class="timer-btn" id="startBtn">▶ START</button>
                    <button class="timer-btn" id="resetBtn">⟳ RESET</button>
                </div>
            </div>

            <div class="roles-box">
                <div style="font-size: 0.8rem; margin-bottom: 0.5rem; color: #e50914;" id="roleLabel">🎬 Discussion Roles</div>
                <div class="role-buttons">
                    <div class="role active" id="roleA">Critic A</div>
                    <div class="role" id="roleB">Viewer B</div>
                </div>
                <button class="swap-btn" id="swapBtn">⇄ Swap Roles</button>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="mainContent">
        <!-- Questions will be dynamically inserted here -->
    </div>
</div>

<script>
    // Questions Data
    const PART1_QUESTIONS = [
        { text: "Do you watch films?" },
        { text: "Do you prefer watching movies at home or in the cinema? Why?" },
        { text: "What is your favorite film? Why?" },
        { text: "Who is your favorite actor or actress?" }
    ];

    const PART2_QUESTIONS = [
        { text: "Do you play video games?" },
        { text: "What kind of video games do you like playing? Why?" },
        { text: "Do you think video games can be educational? Why?" },
        { text: "Do you like playing video games alone or with friends? Why?" }
    ];

    // State
    let currentPart = 1;
    let completed = new Set();
    let timeLeft = 240;
    let timerInterval = null;
    let isRunning = false;
    let roleAIsSpeaker = true;

    // DOM Elements
    const mainContent = document.getElementById('mainContent');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const swapBtn = document.getElementById('swapBtn');
    const roleA = document.getElementById('roleA');
    const roleB = document.getElementById('roleB');
    const roleLabel = document.getElementById('roleLabel');
    const part1Btn = document.getElementById('part1Btn');
    const part2Btn = document.getElementById('part2Btn');
    const filmBg = document.getElementById('filmBg');
    const gamesBg = document.getElementById('gamesBg');
    const appContainer = document.getElementById('appContainer');

    // Timer Functions
    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 30) {
            timerDisplay.style.color = '#ff4444';
        } else if (timeLeft <= 60) {
            timerDisplay.style.color = '#ffaa44';
        } else {
            timerDisplay.style.color = currentPart === 1 ? '#e50914' : '#2ecc71';
        }
        
        if (timeLeft === 0 && isRunning) {
            stopTimer();
            alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 🎬");
        }
    }

    function startTimer() {
        if (isRunning) return;
        if (timeLeft <= 0) {
            timeLeft = 240;
            updateTimerDisplay();
        }
        isRunning = true;
        startBtn.textContent = '⏸ PAUSE';
        startBtn.style.background = currentPart === 1 ? '#e50914' : '#2ecc71';
        startBtn.style.color = '#fff';
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimerDisplay();
            }
            if (timeLeft === 0) {
                stopTimer();
                alert("⏰ Time's up! Great discussion!\n\nDid you cover all 4 questions? 🎬");
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        isRunning = false;
        startBtn.textContent = '▶ START';
        startBtn.style.background = 'rgba(255, 255, 255, 0.1)';
        startBtn.style.color = '#fff';
    }

    function resetTimer() {
        stopTimer();
        timeLeft = 240;
        updateTimerDisplay();
    }

    // Role Functions
    function updateRolesUI() {
        if (currentPart === 1) {
            if (roleAIsSpeaker) {
                roleA.classList.add('active');
                roleB.classList.remove('active');
                roleA.innerHTML = '🎬 Critic A';
                roleB.innerHTML = '🍿 Viewer B';
            } else {
                roleB.classList.add('active');
                roleA.classList.remove('active');
                roleB.innerHTML = '🎬 Critic B';
                roleA.innerHTML = '🍿 Viewer A';
            }
            roleLabel.innerHTML = '🎬 Discussion Roles';
            roleLabel.style.color = '#e50914';
        } else {
            if (roleAIsSpeaker) {
                roleA.classList.add('active');
                roleB.classList.remove('active');
                roleA.innerHTML = '🎮 Player A';
                roleB.innerHTML = '⌨️ Opponent B';
            } else {
                roleB.classList.add('active');
                roleA.classList.remove('active');
                roleB.innerHTML = '🎮 Player B';
                roleA.innerHTML = '⌨️ Opponent A';
            }
            roleLabel.innerHTML = '🎮 CS2 Discussion Roles';
            roleLabel.style.color = '#2ecc71';
        }
    }

    function swapRoles() {
        roleAIsSpeaker = !roleAIsSpeaker;
        updateRolesUI();
    }

    // Theme Switching
    function switchTheme(isFilm) {
        if (isFilm) {
            filmBg.classList.add('active');
            gamesBg.classList.remove('active');
            appContainer.classList.remove('game-mode');
            appContainer.classList.add('film-mode');
            timerDisplay.style.color = '#e50914';
            document.querySelector('#part1Btn').classList.add('active');
            document.querySelector('#part2Btn').classList.remove('active');
        } else {
            gamesBg.classList.add('active');
            filmBg.classList.remove('active');
            appContainer.classList.remove('film-mode');
            appContainer.classList.add('game-mode');
            timerDisplay.style.color = '#2ecc71';
            document.querySelector('#part2Btn').classList.add('active');
            document.querySelector('#part1Btn').classList.remove('active');
        }
    }

    // Question Functions
    function toggleQuestion(index) {
        const fullIndex = (currentPart === 1) ? index : index + 4;
        if (completed.has(fullIndex)) {
            completed.delete(fullIndex);
        } else {
            completed.add(fullIndex);
        }
        renderQuestions();
        renderDots();
    }

    function renderDots() {
        const progressContainer = document.querySelector('.progress-section');
        if (!progressContainer) return;
        
        const dotsDiv = progressContainer.querySelector('.progress-dots');
        if (!dotsDiv) return;
        
        dotsDiv.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const fullIndex = (currentPart === 1) ? i : i + 4;
            const dot = document.createElement('div');
            dot.className = `dot ${completed.has(fullIndex) ? 'completed' : ''}`;
            dot.textContent = i + 1;
            dot.onclick = () => toggleQuestion(i);
            dotsDiv.appendChild(dot);
        }
    }

    function renderQuestions() {
        const questions = currentPart === 1 ? PART1_QUESTIONS : PART2_QUESTIONS;
        const isFilm = currentPart === 1;
        
        mainContent.innerHTML = `
            <div class="questions-container">
                <div class="part-header">
                    <h2 class="${isFilm ? 'film-header' : 'game-header'}">${isFilm ? '🎬 Lights, Camera, Action!' : '🎮 Counter-Strike & Gaming World'}</h2>
                    <p>${isFilm ? 'Discuss your favorite movies, actors, and cinema experiences' : 'Explore the world of CS2, gaming strategies, and multiplayer fun'}</p>
                </div>
                
                ${questions.map((q, idx) => {
                    const fullIndex = currentPart === 1 ? idx : idx + 4;
                    const isCompleted = completed.has(fullIndex);
                    return `
                        <div class="question-card ${isCompleted ? 'completed' : ''}" onclick="window.toggleQuestion(${idx})">
                            <div class="question-number">Q${idx + 1}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="check-icon">✓</div>
                        </div>
                    `;
                }).join('')}
                
                <div class="progress-section">
                    <div class="progress-dots"></div>
                    <button class="reset-btn" id="resetProgressBtn">⟳ Reset Progress</button>
                </div>
            </div>
        `;
        
        renderDots();
        
        // Add reset progress listener
        const resetProgressBtn = document.getElementById('resetProgressBtn');
        if (resetProgressBtn) {
            resetProgressBtn.onclick = () => {
                const startIndex = currentPart === 1 ? 0 : 4;
                const endIndex = startIndex + 4;
                for (let i = startIndex; i < endIndex; i++) {
                    completed.delete(i);
                }
                renderQuestions();
                renderDots();
            };
        }
    }

    // Part Switching
    function switchToPart(part) {
        currentPart = part;
        const isFilm = part === 1;
        
        switchTheme(isFilm);
        renderQuestions();
        updateRolesUI();
        
        // Reset timer color
        if (isRunning) {
            startBtn.style.background = isFilm ? '#e50914' : '#2ecc71';
        }
    }

    // Make toggleQuestion globally accessible
    window.toggleQuestion = toggleQuestion;

    // Initialize
    function init() {
        switchTheme(true);
        updateTimerDisplay();
        renderQuestions();
        updateRolesUI();
        
        startBtn.onclick = startTimer;
        resetBtn.onclick = resetTimer;
        swapBtn.onclick = swapRoles;
        part1Btn.onclick = () => switchToPart(1);
        part2Btn.onclick = () => switchToPart(2);
    }

    init();
</script>
</body>
</html>
