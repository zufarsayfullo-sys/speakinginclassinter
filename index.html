<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Speaking Exam Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: bgFloat 25s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-1%, -1%) rotate(1deg); }
            66% { transform: translate(1%, 1%) rotate(-1deg); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            opacity: 0.12;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.12; }
            90% { opacity: 0.12; }
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stat span {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
            font-size: 1rem;
        }

        /* Control Bar */
        .control-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        /* Topics Grid - 2 columns on desktop, 1 on mobile */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.8rem;
            margin-bottom: 3rem;
            flex: 1;
        }

        @media (max-width: 900px) {
            .topics-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* Topic Card - With Image */
        .topic-card {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            animation: fadeInUp 0.6s ease backwards;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topic-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }

        /* Card Image */
        .card-image {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.5s ease;
        }

        .topic-card:hover .card-image {
            transform: scale(1.03);
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(15, 15, 25, 0.9) 100%);
        }

        .card-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Card Content */
        .card-content {
            padding: 1.5rem;
            position: relative;
            background: rgba(15, 15, 25, 0.95);
        }

        .topic-name {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
            line-height: 1.3;
        }

        .topic-description {
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .topic-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #666;
        }

        .question-count {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .question-count::before {
            content: '💬';
            font-size: 0.8rem;
        }

        .arrow {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .topic-card:hover .arrow {
            transform: translateX(8px);
        }

        /* Floating Random Button */
        .floating-random {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            animation: fadeInUp 0.6s ease, glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(99, 102, 241, 0);
            }
        }

        .random-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .random-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .random-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .random-btn:hover {
            transform: scale(1.05);
            gap: 1.2rem;
        }

        .random-btn:active {
            transform: scale(0.98);
        }

        .random-icon {
            font-size: 1.3rem;
            transition: transform 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .random-btn:hover .random-icon {
            transform: rotate(360deg);
        }

        .random-text {
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .floating-random {
                bottom: 1rem;
                right: 1rem;
            }
            .random-btn {
                padding: 0.8rem 1.5rem;
            }
            .random-text {
                font-size: 0.8rem;
            }
            .logo {
                font-size: 2.5rem;
            }
            .container {
                padding: 1rem;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.5);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-emoji { font-size: 4rem; margin-bottom: 1rem; }
        .modal-title { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .modal-desc { color: #888; margin: 1rem 0; }
        .modal-buttons { display: flex; gap: 1rem; justify-content: center; }
        .modal-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }
        .modal-btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: #fff; }
        .modal-btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            color: #444;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Fullscreen mode */
        :-webkit-full-screen {
            background-color: #0a0a0a;
        }
        :fullscreen {
            background-color: #0a0a0a;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <h1 class="logo">SPEAK UP</h1>
        <p class="subtitle">Speaking Exam Practice • Intermediate Level • Pair Work</p>
        <div class="stats">
            <div class="stat"><span>10</span> Topics</div>
            <div class="stat"><span>8</span> Questions Each</div>
            <div class="stat"><span>4</span> Minute Timer</div>
            <div class="stat"><span>🎤</span> Part 1 + Part 2</div>
        </div>
    </div>

    <div class="control-bar">
        <button class="fullscreen-btn" id="fullscreenBtn">
            <span>⛶</span> Full Screen
        </button>
    </div>

    <div class="topics-grid" id="topicsGrid"></div>
    
    <div class="footer">
        <p>Click any topic to start your discussion • Practice with a partner • Track your progress</p>
    </div>
</div>

<!-- Floating Random Button -->
<div class="floating-random">
    <button class="random-btn" id="randomBtn">
        <span class="random-icon">🎲</span>
        <span class="random-text">RANDOM TOPIC</span>
        <span class="random-icon">✨</span>
    </button>
</div>

<!-- Modal -->
<div class="modal" id="randomModal">
    <div class="modal-content">
        <div class="modal-emoji" id="modalEmoji">🎲</div>
        <h2 class="modal-title" id="modalTitle">Random Topic</h2>
        <p class="modal-desc" id="modalDesc">Click to start your speaking practice</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="modalConfirmBtn">Open Topic →</button>
            <button class="modal-btn modal-btn-secondary" id="modalCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // 10 TOPICS with images from your speaking exam cards
    const TOPICS = [
        { 
            name: 'Happiness & Patience', 
            tag: 'Psychology', 
            image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=400&fit=crop',
            desc: 'Are you a happy person? Patience & temptations', 
            questions: 8, 
            file: 'topics/happiness-patience.html' 
        },
        { 
            name: 'Business & Entrepreneurship', 
            tag: 'Career', 
            image: 'https://images.unsplash.com/photo-1556761175-4b46a572b786?w=600&h=400&fit=crop',
            desc: 'Starting a business, challenges, investors', 
            questions: 8, 
            file: 'topics/business-entrepreneurship.html' 
        },
        { 
            name: 'Competition & Sports', 
            tag: 'Sports', 
            image: 'https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=600&h=400&fit=crop',
            desc: 'Competitive sports, advantages & disadvantages', 
            questions: 8, 
            file: 'topics/competition-sports.html' 
        },
        { 
            name: 'Free Time & Future Jobs', 
            tag: 'Lifestyle', 
            image: 'https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=600&h=400&fit=crop',
            desc: 'Hobbies, dream job, future professions', 
            questions: 8, 
            file: 'topics/freetime-futurejobs.html' 
        },
        { 
            name: 'Crime & Safety', 
            tag: 'Law', 
            image: 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=600&h=400&fit=crop',
            desc: 'City safety, crime types, prevention', 
            questions: 8, 
            file: 'topics/crime-safety.html' 
        },
        { 
            name: 'Movies & Video Games', 
            tag: 'Entertainment', 
            image: 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&h=400&fit=crop',
            desc: 'Films, cinema, gaming habits', 
            questions: 8, 
            file: 'topics/movies-games.html' 
        },
        { 
            name: 'Technology & Gadgets', 
            tag: 'Digital', 
            image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&h=400&fit=crop',
            desc: 'Daily tech use, inventions, future', 
            questions: 8, 
            file: 'topics/technology-gadgets.html' 
        },
        { 
            name: 'Weather & Environment', 
            tag: 'Nature', 
            image: 'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=600&h=400&fit=crop',
            desc: 'Weather preferences, climate change, nature', 
            questions: 8, 
            file: 'topics/weather-environment.html' 
        },
        { 
            name: 'Food & Challenges', 
            tag: 'Lifestyle', 
            image: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&h=400&fit=crop',
            desc: 'Traditional food, overcoming challenges', 
            questions: 8, 
            file: 'topics/food-challenges.html' 
        },
        { 
            name: 'Films & Technology', 
            tag: 'Media', 
            image: 'https://images.unsplash.com/photo-1574267432553-4b4628081c31?w=600&h=400&fit=crop',
            desc: 'Film genres, streaming, online safety', 
            questions: 8, 
            file: 'topics/films-technology.html' 
        }
    ];

    let pendingRandomTopic = null;

    // Create floating particles
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 12 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // Render topics grid
    function renderTopics() {
        const grid = document.getElementById('topicsGrid');
        grid.innerHTML = TOPICS.map((topic, index) => `
            <div class="topic-card" style="animation-delay: ${index * 0.05}s" data-topic-index="${index}">
                <div class="card-image" style="background-image: url('${topic.image}')">
                    <span class="card-tag">${topic.tag}</span>
                </div>
                <div class="card-content">
                    <h3 class="topic-name">${topic.name}</h3>
                    <p class="topic-description">${topic.desc}</p>
                    <div class="topic-meta">
                        <span class="question-count">${topic.questions} questions</span>
                        <span class="arrow">→</span>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.topic-card').forEach((card, idx) => {
            card.addEventListener('click', () => {
                const topic = TOPICS[idx];
                window.location.href = topic.file;
            });
        });
    }

    // Fullscreen functionality
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // Random topic functions
    function animateRandomIcon() {
        const btn = document.querySelector('.random-btn');
        const icons = document.querySelectorAll('.random-icon');
        btn.style.transform = 'scale(0.95)';
        icons.forEach(icon => {
            icon.style.transform = 'rotate(360deg)';
        });
        setTimeout(() => { 
            btn.style.transform = ''; 
            icons.forEach(icon => {
                icon.style.transform = '';
            });
        }, 300);
    }

    function showRandomTopic() {
        const randomIndex = Math.floor(Math.random() * TOPICS.length);
        pendingRandomTopic = TOPICS[randomIndex];
        
        const modal = document.getElementById('randomModal');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        
        const emojis = ['🎲', '🎯', '💼', '🏆', '🎬', '💻', '🌤️', '🍲', '📺'];
        modalEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        modalTitle.textContent = pendingRandomTopic.name;
        modalDesc.textContent = `${pendingRandomTopic.tag} · ${pendingRandomTopic.questions} questions · 4 minute timer`;
        
        modal.classList.add('show');
    }

    function confirmRandomTopic() {
        if (pendingRandomTopic) {
            window.location.href = pendingRandomTopic.file;
        }
        closeModal();
    }

    function closeModal() {
        document.getElementById('randomModal').classList.remove('show');
        pendingRandomTopic = null;
    }

    // Initialize
    createParticles();
    renderTopics();
    
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
    document.getElementById('randomBtn').addEventListener('click', () => {
        animateRandomIcon();
        setTimeout(showRandomTopic, 200);
    });
    document.getElementById('modalConfirmBtn').addEventListener('click', confirmRandomTopic);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    
    document.getElementById('randomModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('randomModal')) {
            closeModal();
        }
    });
</script>
</body>
</html>
